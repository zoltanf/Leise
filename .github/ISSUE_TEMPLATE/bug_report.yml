name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which Leise app or surface is affected?
      options:
        - macOS
        - iOS
        - iOS Keyboard
        - Cloud Provider
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open Leise
        2. Go to ...
        3. Click on ...
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS Version
      placeholder: "e.g. macOS 15.3 Sequoia or iOS 27.0"
  - type: input
    id: app-version
    attributes:
      label: Leise Version
      placeholder: "e.g. 0.10.0"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Diagnostics / Logs
      description: Export and attach a privacy-safe JSON report from Settings > Advanced > Support Diagnostics > Export Diagnostics or Error Log > Export Diagnostics if possible. The report does not include API keys, audio, or transcription history. You can also paste any relevant log output from Console.app filtered by "Leise".
      render: shell
