name: Build DMG

on:
  push:
    branches:
      - '**'
      - '!main'
      - '!gh-pages'
    tags-ignore:
      - 'v*'
      - 'plugin-*'
  pull_request:
    branches: [main]

env:
  SCHEME: TypeWhisper
  PROJECT: TypeWhisper.xcodeproj

jobs:
  release-build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: "26.3"

      - name: Resolve Swift packages
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt of 3"
            if xcodebuild -resolvePackageDependencies \
              -project $PROJECT \
              -scheme $SCHEME; then
              exit 0
            fi
            echo "Package resolution failed, retrying in 10s..."
            sleep 10
          done
          exit 1

      - name: Verify Instrumentation Check Script
        run: bash scripts/check_release_binary_instrumentation.sh --self-test

      - name: Build App
        run: |
          set -o pipefail
          xcodebuild -project $PROJECT \
            -scheme $SCHEME \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            ENABLE_CODE_COVERAGE=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | tee build.log

      - name: Check First-Party Warnings
        run: bash scripts/check_first_party_warnings.sh build.log

      - name: Check Release Binary Instrumentation
        run: bash scripts/check_release_binary_instrumentation.sh build/Build/Products/Release/TypeWhisper.app/Contents/MacOS/typewhisper-cli

      - name: Install dmgbuild
        run: |
          VENV_DIR="${RUNNER_TEMP}/dmgbuild-venv"
          python3 -m venv "$VENV_DIR"
          source "$VENV_DIR/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install dmgbuild
          echo "$VENV_DIR/bin" >> $GITHUB_PATH

      - name: Create DMG
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          APP_NAME="TypeWhisper"
          DMG_NAME="TypeWhisper-${SHORT_SHA}.dmg"
          APP_PATH="build/Build/Products/Release/TypeWhisper.app"
          SETTINGS="${GITHUB_WORKSPACE}/.github/dmgbuild-settings.py"
          BACKGROUND="${GITHUB_WORKSPACE}/.github/dmg-background.png"

          dmgbuild -s "$SETTINGS" \
            -D app="$APP_NAME" \
            -D app_path="$APP_PATH" \
            -D background="$BACKGROUND" \
            "$APP_NAME" \
            "build/${DMG_NAME}"

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: TypeWhisper-DMG
          path: build/TypeWhisper-*.dmg
          retention-days: 14

  app-tests:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: "26.3"

      - name: Resolve Swift packages
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt of 3"
            if xcodebuild -resolvePackageDependencies \
              -project $PROJECT \
              -scheme $SCHEME; then
              exit 0
            fi
            echo "Package resolution failed, retrying in 10s..."
            sleep 10
          done
          exit 1

      - name: Run App Tests
        run: |
          set -o pipefail
          xcodebuild test -project $PROJECT \
            -scheme $SCHEME \
            -destination 'platform=macOS,arch=arm64' \
            -parallel-testing-enabled NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | tee test.log

      - name: Check First-Party Warnings
        run: bash scripts/check_first_party_warnings.sh test.log

  plugin-sdk-tests:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: "26.3"

      - name: Run Plugin SDK Tests
        run: swift test --package-path TypeWhisperPluginSDK
